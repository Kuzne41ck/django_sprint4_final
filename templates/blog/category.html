{% extends "base.html" %}

{% block content %}
  <h1>{{ category.title }}</h1>
  <p>Слаг категории: {{ category.slug }}</p>

  {% for post in posts %}
    <article>
      <h2>{{ post.title }}</h2>
      <p>{{ post.text }}</p>

      <p>Локация:
        {% if post.location %}
          {{ post.location.name }}
        {% else %}
          Планета Земля
        {% endif %}
      </p>
    </article>
  {% endfor %}
{% endblock %}
