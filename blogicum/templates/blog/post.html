{% extends "base.html" %}

{% block content %}
  <h1>{{ post.title }}</h1>
  <p>{{ post.text }}</p>

  <p>Категория: {{ post.category.title }}</p>
  <p>Слаг категории: {{ post.category.slug }}</p>

  <p>Локация:
    {% if post.location %}
      {{ post.location.name }}
    {% else %}
      Планета Земля
    {% endif %}
  </p>
{% endblock %}
